appId: com.gfxteam.distributor
productName: GFX Distributor
copyright: Copyright © 2026

directories:
  buildResources: build
  output: dist-electron

files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'

asarUnpack:
  - resources/**
  - node_modules/exiftool-vendored.pl/**
  - node_modules/exiftool-vendored/**
  - node_modules/tesseract.js/**
  - node_modules/tesseract.js-core/**

# macOS: bundle mac ffmpeg binaries from npm packages
extraResources:
  - from: node_modules/ffmpeg-static/ffmpeg
    to: ffmpeg/ffmpeg
  - from: node_modules/ffprobe-static/bin/darwin/arm64/ffprobe
    to: ffmpeg/ffprobe

mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.video
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false

dmg:
  artifactName: ${name}-${version}.${ext}

# Windows: override extraResources for win binaries
win:
  target:
    - target: nsis
      arch:
        - x64
  extraResources:
    - from: resources/ffmpeg/win/ffmpeg.exe
      to: ffmpeg/ffmpeg.exe
    - from: node_modules/ffprobe-static/bin/win32/x64/ffprobe.exe
      to: ffmpeg/ffprobe.exe

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always

npmRebuild: false
